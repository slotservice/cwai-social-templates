{# ═══════════════════════════════════════════════════════
   HERO A — Centered Hero with Pulse Rings

   Dynamic elements (content-dynamic):
     TAGLINE        — top label text
     TITLE_PREFIX   — first part of headline
     TITLE_HIGHLIGHT— gradient-colored keyword
     TITLE_SUFFIX   — rest of headline
     SUBTITLE       — description text
     METRIC_n_LABEL — metric label (n = 0,1,2...)
     METRIC_n_VALUE — metric value
     FOOTER_LEFT    — bottom-left text
     FOOTER_RIGHT   — bottom-right text

   Static elements:
     bg-static      — background, grid, glows
     chrome-static  — corners, footer bar
     decor-static   — pulse rings, particles, signal lines
   ═══════════════════════════════════════════════════════ #}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{ width }} {{ height }}" width="{{ width }}" height="{{ height }}" font-family="Outfit, sans-serif">
<defs>
  {% include "partials/base_defs.svg" %}
</defs>

{% include "partials/bg_static.svg" %}

<!-- ─── Decorative: pulse rings, particles, signal lines ─── -->
<g id="decor-static">
  <g id="pulse-rings" opacity="0.15">
    <circle cx="{{ width/2 }}" cy="{{ height/2 }}" r="100" fill="none" stroke="rgba(0,210,200,0.3)" stroke-width="1"/>
    <circle cx="{{ width/2 }}" cy="{{ height/2 }}" r="175" fill="none" stroke="rgba(0,210,200,0.2)" stroke-width="1"/>
    <circle cx="{{ width/2 }}" cy="{{ height/2 }}" r="260" fill="none" stroke="rgba(0,210,200,0.15)" stroke-width="1"/>
    <circle cx="{{ width/2 }}" cy="{{ height/2 }}" r="350" fill="none" stroke="rgba(0,210,200,0.1)" stroke-width="1"/>
  </g>

  <g id="particles">
    <circle cx="{{ width * 0.22 }}" cy="{{ height * 0.18 }}" r="1.5" fill="rgba(0,210,200,0.5)"/>
    <circle cx="{{ width * 0.82 }}" cy="{{ height * 0.30 }}" r="1.5" fill="rgba(0,210,200,0.4)"/>
    <circle cx="{{ width * 0.28 }}" cy="{{ height * 0.75 }}" r="1.5" fill="rgba(0,210,200,0.5)"/>
    <circle cx="{{ width * 0.14 }}" cy="{{ height * 0.42 }}" r="1.5" fill="rgba(0,210,200,0.3)"/>
    <circle cx="{{ width * 0.78 }}" cy="{{ height * 0.65 }}" r="1.5" fill="rgba(0,210,200,0.4)"/>
    <circle cx="{{ width * 0.55 }}" cy="{{ height * 0.22 }}" r="1.5" fill="rgba(0,210,200,0.3)"/>
  </g>

  <g id="signal-lines">
    <line x1="{{ width * 0.05 }}" y1="{{ height * 0.30 }}" x2="{{ width * 0.22 }}" y2="{{ height * 0.28 }}" stroke="rgba(0,210,200,0.12)" stroke-width="1"/>
    <line x1="{{ width * 0.78 }}" y1="{{ height * 0.72 }}" x2="{{ width * 0.95 }}" y2="{{ height * 0.70 }}" stroke="rgba(0,210,200,0.12)" stroke-width="1"/>
  </g>
</g>

{% include "partials/chrome_static.svg" %}

<!-- ─── Dynamic Content ─── -->
<g id="content-dynamic">
  {# --- Tagline --- #}
  <text id="TAGLINE" x="{{ width/2 }}" y="{{ height * 0.32 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="rgba(0,210,200,0.5)" letter-spacing="4" text-transform="uppercase">{{ data.tagline_top | default('AI Ecosystem Intelligence') }}</text>

  {# --- Main headline --- #}
  {% set title_y = height * 0.42 %}
  {% set line_height = height * 0.075 if width > 1000 else height * 0.065 %}
  {% set font_size = 52 if width >= 1200 else (42 if width >= 1080 else 38) %}

  <text id="TITLE" x="{{ width/2 }}" y="{{ title_y }}" text-anchor="middle" font-size="{{ font_size }}" font-weight="800" letter-spacing="-1">
    <tspan id="TITLE_PREFIX" fill="#ffffff">{{ data.title_prefix | default('The') }} </tspan>
    <tspan id="TITLE_HIGHLIGHT" fill="url(#cyan-gradient)">{{ data.title_highlight | default('Signal') }}</tspan>
    <tspan id="TITLE_SUFFIX" fill="#ffffff"> {{ data.title_suffix | default('Behind') }}</tspan>
  </text>
  <text id="TITLE_LINE2" x="{{ width/2 }}" y="{{ title_y + line_height }}" text-anchor="middle" font-size="{{ font_size }}" font-weight="800" fill="#ffffff" letter-spacing="-1">{{ data.title_line2 | default('Every AI Breakout') }}</text>

  {# --- Subtitle --- #}
  <text id="SUBTITLE" x="{{ width/2 }}" y="{{ title_y + line_height * 2 + 10 }}" text-anchor="middle" font-size="17" font-weight="300" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">{{ data.subtitle | default('Tracking momentum across 2,400+ AI tools so you never miss the next breakout.') }}</text>

  {# --- Metrics row --- #}
  {% if data.metrics %}
  {% set metric_count = data.metrics | length %}
  {% set pill_width = 160 %}
  {% set pill_gap = 16 %}
  {% set total_width = metric_count * pill_width + (metric_count - 1) * pill_gap %}
  {% set start_x = (width - total_width) / 2 %}
  {% set metric_y = title_y + line_height * 2 + 55 %}

  <g id="metrics">
    {% for m in data.metrics %}
    {% set mx = start_x + loop.index0 * (pill_width + pill_gap) %}
    <g id="METRIC_{{ loop.index0 }}">
      <rect x="{{ mx }}" y="{{ metric_y }}" width="{{ pill_width }}" height="36" rx="6" fill="rgba(0,210,200,0.04)" stroke="rgba(0,210,200,0.12)" stroke-width="1"/>
      <text id="METRIC_{{ loop.index0 }}_LABEL" x="{{ mx + 16 }}" y="{{ metric_y + 23 }}" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="1" text-transform="uppercase">{{ m.label }}</text>
      <text id="METRIC_{{ loop.index0 }}_VALUE" x="{{ mx + pill_width - 16 }}" y="{{ metric_y + 23 }}" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#00d2c8">{{ m.value }}</text>
    </g>
    {% endfor %}
  </g>
  {% endif %}
</g>

</svg>
