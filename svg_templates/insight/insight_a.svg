{# ═══════════════════════════════════════════════════════
   INSIGHT A — Quote / Data Card

   Dynamic elements: LABEL, QUOTE_MARK, QUOTE_TEXT,
     SOURCE, DATA_n_VALUE, DATA_n_LABEL,
     FOOTER_LEFT, FOOTER_RIGHT
   ═══════════════════════════════════════════════════════ #}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{ width }} {{ height }}" width="{{ width }}" height="{{ height }}" font-family="Outfit, sans-serif">
<defs>
  {% include "partials/base_defs.svg" %}
</defs>

{% include "partials/bg_static.svg" %}
{% include "partials/chrome_static.svg" %}

<g id="content-dynamic">
  {% set cx = width / 2 %}
  {% set font_size = 32 if width >= 1200 else 28 %}

  {# --- Label badge --- #}
  <g id="LABEL_BADGE">
    <rect x="{{ cx - 55 }}" y="{{ height * 0.18 }}" width="110" height="26" rx="4" fill="rgba(0,210,200,0.04)" stroke="rgba(0,210,200,0.15)" stroke-width="1"/>
    <text id="LABEL" x="{{ cx }}" y="{{ height * 0.18 + 18 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(0,210,200,0.5)" letter-spacing="4">{{ data.label | default('DATA INSIGHT') }}</text>
  </g>

  {# --- Quote mark --- #}
  <text id="QUOTE_MARK" x="{{ cx }}" y="{{ height * 0.34 }}" text-anchor="middle" font-size="80" font-weight="800" fill="rgba(0,210,200,0.15)">"</text>

  {# --- Quote text --- #}
  <text id="QUOTE_TEXT" x="{{ cx }}" y="{{ height * 0.44 }}" text-anchor="middle" font-size="{{ font_size }}" font-weight="700" fill="#ffffff">
    {{ data.quote | default('Open-source AI tools grew 3.2x faster than proprietary alternatives.') }}
  </text>

  {# --- Source --- #}
  {% if data.source %}
  <text id="SOURCE" x="{{ cx }}" y="{{ height * 0.55 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">— {{ data.source }}</text>
  {% endif %}

  {# --- Divider --- #}
  <line x1="{{ cx - 30 }}" y1="{{ height * 0.60 }}" x2="{{ cx + 30 }}" y2="{{ height * 0.60 }}" stroke="rgba(0,210,200,0.3)" stroke-width="1"/>

  {# --- Data points --- #}
  {% if data.data_points %}
  {% set dp_count = data.data_points | length %}
  {% set dp_gap = 80 %}
  {% set total_dp_w = dp_count * dp_gap %}
  {% set dp_start_x = cx - total_dp_w / 2 + dp_gap / 2 %}
  {% set dp_y = height * 0.68 %}

  <g id="data-points">
    {% for d in data.data_points %}
    {% set dx = dp_start_x + loop.index0 * dp_gap %}
    <g id="DATA_{{ loop.index0 }}">
      <text id="DATA_{{ loop.index0 }}_VALUE" x="{{ dx }}" y="{{ dp_y }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#00d2c8">{{ d.value }}</text>
      <text id="DATA_{{ loop.index0 }}_LABEL" x="{{ dx }}" y="{{ dp_y + 22 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="2">{{ d.label | upper }}</text>
    </g>
    {% endfor %}
  </g>
  {% endif %}
</g>

</svg>
