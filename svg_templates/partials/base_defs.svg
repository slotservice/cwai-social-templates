{# ═══════════════════════════════════════════════════════
   CWAI SVG Base Definitions
   Shared <defs> block included in all templates.
   Contains: gradients, filters, patterns, clip paths.
   ═══════════════════════════════════════════════════════ #}

<!-- Background gradient -->
<linearGradient id="bg-gradient" x1="0" y1="0" x2="0.6" y2="1">
  <stop offset="0%" stop-color="#0b1026"/>
  <stop offset="50%" stop-color="#0d1530"/>
  <stop offset="100%" stop-color="#091220"/>
</linearGradient>

<!-- Cyan accent gradient (for highlighted text, bars) -->
<linearGradient id="cyan-gradient" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#00d2c8"/>
  <stop offset="50%" stop-color="#38e6b4"/>
  <stop offset="100%" stop-color="#00b4dc"/>
</linearGradient>

<!-- Momentum bar gradient -->
<linearGradient id="bar-gradient" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#00d2c8"/>
  <stop offset="100%" stop-color="#38e6b4"/>
</linearGradient>

<!-- CTA button gradient -->
<linearGradient id="cta-gradient" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#00d2c8"/>
  <stop offset="100%" stop-color="#38e6b4"/>
</linearGradient>

<!-- Glow filter for orbs -->
<filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur"/>
  <feComposite in="blur" in2="SourceGraphic" operator="over"/>
</filter>

<!-- Grid pattern -->
<pattern id="grid-pattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
  <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,210,200,0.035)" stroke-width="1"/>
</pattern>

<!-- Grid mask (fades at edges) -->
<radialGradient id="grid-mask-grad" cx="50%" cy="50%" r="50%">
  <stop offset="10%" stop-color="white"/>
  <stop offset="70%" stop-color="black"/>
</radialGradient>
<mask id="grid-mask">
  <ellipse cx="{{ width / 2 }}" cy="{{ height / 2 }}" rx="{{ width * 0.4 }}" ry="{{ height * 0.35 }}" fill="url(#grid-mask-grad)"/>
</mask>
