{# ═══════════════════════════════════════════════════════
   SURGING E — Minimal Spotlight (name + big number, clean)

   Dynamic elements:
     CATEGORY, TOOL_NAME, TAGLINE,
     GROWTH_VALUE, GROWTH_LABEL, PERIOD,
     SIGNAL_BADGE, FOOTER_LEFT, FOOTER_RIGHT
   ═══════════════════════════════════════════════════════ #}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{ width }} {{ height }}" width="{{ width }}" height="{{ height }}" font-family="Outfit, sans-serif">
<defs>
  {% include "partials/base_defs.svg" %}
</defs>

{% include "partials/bg_static.svg" %}
{% include "partials/chrome_static.svg" %}

<g id="content-dynamic">
  {% set cx = width / 2 %}

  <text id="CATEGORY" x="{{ cx }}" y="{{ height * 0.22 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(0,210,200,0.5)" letter-spacing="4">{{ data.category | default('SURGING TOOL') }}</text>

  <text id="TOOL_NAME" x="{{ cx }}" y="{{ height * 0.38 }}" text-anchor="middle" font-size="56" font-weight="800" fill="#ffffff">{{ data.tool_name | default('Ollama') }}</text>

  <text id="TAGLINE" x="{{ cx }}" y="{{ height * 0.46 }}" text-anchor="middle" font-size="16" font-weight="300" fill="rgba(255,255,255,0.35)">{{ data.tagline | default('Run LLMs locally with a simple CLI') }}</text>

  {# --- Divider --- #}
  <line x1="{{ cx - 40 }}" y1="{{ height * 0.52 }}" x2="{{ cx + 40 }}" y2="{{ height * 0.52 }}" stroke="rgba(0,210,200,0.2)" stroke-width="1"/>

  {# --- Big growth number --- #}
  <text id="GROWTH_VALUE" x="{{ cx }}" y="{{ height * 0.68 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="64" font-weight="700" fill="#00d2c8">{{ data.growth_value | default('+4,210') }}</text>
  <text id="GROWTH_LABEL" x="{{ cx }}" y="{{ height * 0.75 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="3">{{ data.growth_label | default('STARS GAINED') }}</text>
  <text id="PERIOD" x="{{ cx }}" y="{{ height * 0.80 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(0,210,200,0.4)" letter-spacing="1">{{ data.period | default('Past 7 days') }}</text>

  {% if data.signal %}
  {% set badge_color = '#38e6b4' if data.signal|lower == 'hot' else '#00d2c8' %}
  <g id="SIGNAL_BADGE">
    <rect x="{{ cx - 40 }}" y="{{ height * 0.84 }}" width="80" height="26" rx="13" fill="rgba(0,210,200,0.06)" stroke="{{ badge_color }}" stroke-width="1" stroke-opacity="0.3"/>
    <text x="{{ cx }}" y="{{ height * 0.84 + 18 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="{{ badge_color }}" letter-spacing="2">{{ data.signal }}</text>
  </g>
  {% endif %}
</g>

</svg>
