{# ═══════════════════════════════════════════════════════
   SURGING F — Category Trio (3 tools side by side)

   Dynamic elements:
     BRAND, TAG, TITLE, TITLE_HIGHLIGHT, SUBTITLE,
     TOOL_n_ICON, TOOL_n_NAME, TOOL_n_GROWTH,
     TOOL_n_CATEGORY, TOOL_n_SIGNAL,
     FOOTER_LEFT, FOOTER_RIGHT
   ═══════════════════════════════════════════════════════ #}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{ width }} {{ height }}" width="{{ width }}" height="{{ height }}" font-family="Outfit, sans-serif">
<defs>
  {% include "partials/base_defs.svg" %}
</defs>

{% include "partials/bg_static.svg" %}
{% include "partials/chrome_static.svg" %}

<g id="content-dynamic">
  {% set left = 44 %}
  {% set right = width - 44 %}
  {% set cx = width / 2 %}

  <g id="top-bar">
    <text id="BRAND" x="{{ left }}" y="48" font-size="18" font-weight="700" fill="#ffffff">{{ data.brand | default('CrowdWiseAI') }}</text>
    <g id="TAG">
      <rect x="{{ right - 130 }}" y="28" width="130" height="28" rx="4" fill="rgba(0,210,200,0.06)" stroke="rgba(0,210,200,0.15)" stroke-width="1"/>
      <text x="{{ right - 65 }}" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(0,210,200,0.7)" letter-spacing="2">{{ data.tag | default('TOP 3 SURGING') }}</text>
    </g>
  </g>

  <text id="TITLE" x="{{ cx }}" y="95" text-anchor="middle" font-size="34" font-weight="800">
    <tspan fill="#ffffff">{{ data.title | default('Top') }} </tspan>
    <tspan id="TITLE_HIGHLIGHT" fill="url(#cyan-gradient)">{{ data.title_highlight | default('Surging Tools') }}</tspan>
  </text>
  <text id="SUBTITLE" x="{{ cx }}" y="117" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="1">{{ data.subtitle | default('// highest momentum this week') }}</text>

  {% if data.tools %}
  {% set card_gap = 20 %}
  {% set card_count = data.tools | length %}
  {% set card_w = (right - left - (card_count - 1) * card_gap) / card_count %}
  {% set card_y = 145 %}
  {% set card_h = height - 220 %}

  <g id="tools">
    {% for tool in data.tools %}
    {% set card_x = left + loop.index0 * (card_w + card_gap) %}
    {% set card_cx = card_x + card_w / 2 %}
    {% set is_first = loop.first %}
    {% set signal_color = '#38e6b4' if tool.signal|lower == 'hot' else ('#00d2c8' if tool.signal|lower == 'rising' else 'rgba(0,210,200,0.6)') %}

    <g id="TOOL_{{ loop.index0 }}">
      <rect x="{{ card_x }}" y="{{ card_y }}" width="{{ card_w }}" height="{{ card_h }}" rx="12"
        fill="{{ 'rgba(0,210,200,0.06)' if is_first else 'rgba(0,210,200,0.03)' }}"
        stroke="{{ 'rgba(0,210,200,0.2)' if is_first else 'rgba(0,210,200,0.08)' }}" stroke-width="1"/>

      {# Icon #}
      <rect x="{{ card_cx - 28 }}" y="{{ card_y + 24 }}" width="56" height="56" rx="14" fill="rgba(0,210,200,0.06)" stroke="rgba(0,210,200,0.15)" stroke-width="1"/>
      <text id="TOOL_{{ loop.index0 }}_ICON" x="{{ card_cx }}" y="{{ card_y + 62 }}" text-anchor="middle" font-size="28">{{ tool.icon | default('🚀') }}</text>

      {# Category #}
      <text id="TOOL_{{ loop.index0 }}_CATEGORY" x="{{ card_cx }}" y="{{ card_y + 105 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(0,210,200,0.5)" letter-spacing="2">{{ tool.category | default('AI TOOL') }}</text>

      {# Name #}
      <text id="TOOL_{{ loop.index0 }}_NAME" x="{{ card_cx }}" y="{{ card_y + 130 }}" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">{{ tool.name }}</text>

      {# Growth #}
      <text id="TOOL_{{ loop.index0 }}_GROWTH" x="{{ card_cx }}" y="{{ card_y + card_h - 55 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#00d2c8">{{ tool.growth }}</text>

      {# Signal badge #}
      <rect x="{{ card_cx - 35 }}" y="{{ card_y + card_h - 40 }}" width="70" height="24" rx="12" fill="rgba(0,210,200,0.06)" stroke="{{ signal_color }}" stroke-width="1" stroke-opacity="0.3"/>
      <text id="TOOL_{{ loop.index0 }}_SIGNAL" x="{{ card_cx }}" y="{{ card_y + card_h - 23 }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="{{ signal_color }}" letter-spacing="1">{{ tool.signal }}</text>
    </g>
    {% endfor %}
  </g>
  {% endif %}
</g>

</svg>
